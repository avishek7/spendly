{% extends "base.html" %}

{% block title %}Add Expense — Spendly{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="auth-container">

    <div class="auth-header">
      <h1 class="auth-title">Add Expense</h1>
      <p class="auth-subtitle">Record a new transaction to your account.</p>
    </div>

    {% if error %}
    <div class="auth-error">{{ error }}</div>
    {% endif %}

    <div class="auth-card">
      <form method="POST" action="{{ url_for('add_expense') }}">

        <div class="form-group">
          <label for="amount">Amount (₹)</label>
          <input
            type="number"
            id="amount"
            name="amount"
            class="form-input"
            step="0.01"
            min="0.01"
            placeholder="0.00"
            value="{{ form.amount }}"
            required
            autofocus
          >
        </div>

        <div class="form-group">
          <label for="category">Category</label>
          <select id="category" name="category" class="form-input">
            <option value="" disabled {% if not form.category %}selected{% endif %}>Select a category</option>
            {% for cat in categories %}
            <option value="{{ cat }}" {% if form.category == cat %}selected{% endif %}>{{ cat }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="form-group">
          <label for="date">Date</label>
          <input
            type="date"
            id="date"
            name="date"
            class="form-input"
            value="{{ form.date }}"
            required
          >
        </div>

        <div class="form-group">
          <label for="description">Description <span style="color: var(--ink-faint); font-weight: 400;">(optional)</span></label>
          <textarea
            id="description"
            name="description"
            class="form-input"
            rows="3"
            placeholder="What was this expense for?"
          >{{ form.description }}</textarea>
        </div>

        <button type="submit" class="btn-submit">Add Expense</button>
      </form>
    </div>

    <p class="auth-switch">
      <a href="{{ url_for('profile') }}">Cancel</a>
    </p>

  </div>
</section>
{% endblock %}
